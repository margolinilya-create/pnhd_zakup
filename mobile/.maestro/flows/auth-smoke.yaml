appId: ${APP_ID}
tags:
  - auth
  - smoke
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: Golden path template
- tapOn:
    id: ${NAME_INPUT_ID}
- inputText: ${E2E_DISPLAY_NAME}
- tapOn:
    id: ${EMAIL_INPUT_ID}
- inputText: ${E2E_EMAIL}
- tapOn:
    id: ${PASSWORD_INPUT_ID}
- inputText: ${E2E_PASSWORD}
- hideKeyboard
- tapOn:
    id: ${SUBMIT_BUTTON_ID}
    enabled: true
- assertVisible:
    id: ${DASHBOARD_ID}
- assertVisible: ${E2E_EMAIL}
- stopApp
- launchApp
- assertVisible:
    id: ${DASHBOARD_ID}
- assertVisible: ${E2E_EMAIL}
- tapOn:
    id: ${LOGOUT_BUTTON_ID}
- assertVisible:
    id: ${SUBMIT_BUTTON_ID}
